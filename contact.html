			<main>
				<h2>Contact Green Pastures Stable and Training</h2>
				<h3>Fill out the form below to contact us.</h3>
                <p>Required fields are marked with an asterisk *</p>
                <form>
                     <label>*First Name:</label>
                     <input type="text" id="FName" name="FName" for="form" required>
                     <label>*Last Name:</label>
                     <input type="text" id="LName" name="LName" for="form" required>
                     <label>*E-mail:</label>
                     <input type="text" id="email" name="email" for="form" style="font-size: 40;" required>
                     <label>Phone:</label>
                     <input type="text" id="phone" name="phone" for="form" style="max-width: 12;">
                     <label>*Message:</label>
                     <textarea type="text" id="message" name="message" rows="2" cols="30" required></textarea>
                     <input type="submit" value="submit">
                </form>
			</main>
